<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Cyber Shooter - Neon Battle</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        .stat { font-size: 24px; text-shadow: 0 0 10px #0ff; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">ҰПАЙ: <span id="score">0</span></div>
        <div class="stat" style="color: #f0f;">ӨМІР: <span id="lives">3</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');

        canvas.width = 600;
        canvas.height = 800;

        let score = 0;
        let lives = 3;
        let gameActive = true;

        // Объектілер жиынтығы
        const projectiles = [];
        const enemies = [];
        const particles = [];

        // Ойыншы
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 15,
            color: '#0ff'
        };

        // Бөлшектер (жарылыс эффектісі)
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.radius = Math.random() * 3;
                this.velocity = { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 };
                this.alpha = 1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.02;
            }
        }

        // Оқтар
        class Projectile {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 4;
                this.color = '#fff';
                this.velocity = -10;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
                ctx.fill();
            }
            update() { this.y += this.velocity; }
        }

        // Жаулар
        class Enemy {
            constructor() {
                this.radius = Math.random() * (30 - 10) + 10;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
                this.velocity = Math.random() * 2 + 1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
            update() { this.y += this.velocity; }
        }

        // Оқ ату (Тінтуірді басқанда немесе Space)
        window.addEventListener('mousedown', () => {
            if (!gameActive) return;
            projectiles.push(new Projectile(player.x, player.y));
        });

        // Қозғалыс (Тінтуірмен)
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
        });

        function spawnEnemies() {
            if (!gameActive) return;
            enemies.push(new Enemy());
            setTimeout(spawnEnemies, 1000);
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ойыншыны сызу
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 15, player.y + 10);
            ctx.lineTo(player.x + 15, player.y + 10);
            ctx.closePath();
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Оқтарды жаңарту
            projectiles.forEach((p, index) => {
                p.update(); p.draw();
                if (p.y < 0) projectiles.splice(index, 1);
            });

            // Бөлшектерді жаңарту
            particles.forEach((part, index) => {
                if (part.alpha <= 0) particles.splice(index, 1);
                else { part.update(); part.draw(); }
            });

            // Жауларды жаңарту
            enemies.forEach((enemy, eIndex) => {
                enemy.update(); enemy.draw();

                // Ойыншымен соқтығысу
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer < enemy.radius + 15) {
                    lives--;
                    livesEl.innerText = lives;
                    enemies.splice(eIndex, 1);
                    if (lives <= 0) {
                        gameActive = false;
                        alert("ОЙЫН БІТТІ! Ұпайыңыз: " + score);
                        location.reload();
                    }
                }

                // Оқпен соқтығысу
                projectiles.forEach((p, pIndex) => {
                    const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (dist < enemy.radius + p.radius) {
                        // Жарылыс жасау
                        for(let i=0; i<15; i++) particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                        
                        score += 100;
                        scoreEl.innerText = score;
                        setTimeout(() => {
                            enemies.splice(eIndex, 1);
                            projectiles.splice(pIndex, 1);
                        }, 0);
                    }
                });

                if (enemy.y > canvas.height) enemies.splice(eIndex, 1);
            });
        }

        spawnEnemies();
        animate();
    </script>
</body>
</html>
