<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Таймер және Кедергілер</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #16213e; background: #0f3460; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .stats { display: flex; gap: 20px; margin-bottom: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <div class="stats">
        <div>Уақыт: <span id="timeVal">30</span>с</div>
        <div>Ұпай: <span id="scoreVal">0</span></div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const timeElement = document.getElementById('timeVal');

        let score = 0;
        let timeLeft = 30;
        let gameActive = true;

        // Ойыншы
        let player = { x: 50, y: 50, size: 25, speed: 5, color: '#4ecca3' };
        
        // Нысана (алтын)
        let food = { x: 300, y: 200, size: 15, color: '#f1c40f' };

        // Кедергілер жиыны
        let obstacles = [
            { x: 200, y: 100, w: 20, h: 100, speedY: 2 },
            { x: 400, y: 200, w: 20, h: 100, speedY: -2 }
        ];

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Таймер функциясы
        const timerInterval = setInterval(() => {
            if (gameActive) {
                timeLeft--;
                timeElement.innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameActive = false;
                    alert("Уақыт бітті! Сіздің ұпайыңыз: " + score);
                    clearInterval(timerInterval);
                    location.reload(); 
                }
            }
        }, 1000);

        function update() {
            if (!gameActive) return;

            // Басқару
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.size) player.x += player.speed;

            // Нысананы жеу
            if (player.x < food.x + food.size && player.x + player.size > food.x &&
                player.y < food.y + food.size && player.y + player.size > food.y) {
                score += 10;
                scoreElement.innerText = score;
                food.x = Math.random() * (canvas.width - 20);
                food.y = Math.random() * (canvas.height - 20);
            }

            // Кедергілер қозғалысы және соқтығысу
            obstacles.forEach(obs => {
                obs.y += obs.speedY;
                if (obs.y <= 0 || obs.y + obs.h >= canvas.height) obs.speedY *= -1;

                // Кедергіге тиіп кетсе
                if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.size > obs.y) {
                    score = Math.max(0, score - 1); // Ұпай азайту
                    scoreElement.innerText = score;
                    player.color = '#e94560'; // Түсін уақытша өзгерту
                } else {
                    player.color = '#4ecca3';
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ойыншы
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Нысана
            ctx.fillStyle = food.color;
            ctx.beginPath();
            ctx.arc(food.x + food.size/2, food.y + food.size/2, food.size/2, 0, Math.PI * 2);
            ctx.fill();

            // Кедергілер
            ctx.fillStyle = '#e94560';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });
        }

        function gameLoop() {
            update();
            draw();
            if (gameActive) requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
