<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Collector Game</title>
    <style>
        /* Бүкіл беттің стилі */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Күңгірт футуристік фон */
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Фон анимациясы */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ойын контейнері */
        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Ойын тақтасы (Canvas) */
        canvas {
            background: rgba(0, 0, 0, 0.85); /* Сәл мөлдір қара */
            display: block;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        /* Ұпай панелі */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* Тінтуір тимеуі үшін */
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .game-title {
            font-size: 18px;
            opacity: 0.7;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="ui-panel">
            <div class="game-title">Neon Collector</div>
            <div class="score-box">Ұпай: <span id="scoreVal">0</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');

        // Ойын параметрлері
        let score = 0;
        let isGameOver = false;

        // Неонды жарық эффектісі функциясы
        function setShadow(color, blur) {
            ctx.shadowColor = color;
            ctx.shadowBlur = blur;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // Ойыншы (Циан түсті неон)
        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 25,
            speed: 7,
            color: '#0ff', // Cyan
            glow: '#0ff'
        };

        // Нысана (Жарқыраған алтын шеңбер)
        let food = {
            x: 0,
            y: 0,
            size: 15,
            color: '#fff', 
            glow: '#f1c40f', // Gold
            angle: 0 // Анимация үшін
        };

        // Нысананы кездейсоқ жерге қою функциясы
        function respawnFood() {
            const margin = 50;
            food.x = margin + Math.random() * (canvas.width - margin * 2);
            food.y = margin + Math.random() * (canvas.height - margin * 2);
        }

        respawnFood(); // Басында бір рет шығару

        // Басқару
        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Логиканы жаңарту
        function update() {
            if (isGameOver) return;

            // Жұмсақ қозғалыс
            if ((keys['ArrowUp'] || keys['KeyW']) && player.y > player.size) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > player.size) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

            // Тамақтың айналу анимациясы
            food.angle += 0.05;

            // Соқтығысуды тексеру (Енді шеңберлер ретінде есептейміз - дәлірек)
            let dx = player.x - food.x;
            let dy = player.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < player.size + food.size) {
                score += 10;
                scoreElement.innerText = score;
                respawnFood();
                // Ұпай алғанда қысқаша діріл эффектісі (опционалды)
                scoreElement.style.transform = 'scale(1.2)';
                setTimeout(() => scoreElement.style.transform = 'scale(1)', 100);
            }
        }

        // Сурет салу
        function draw() {
            // Фонды тазалау (артында із қалдыру үшін азғантай мөлдірлікпен)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Сетка салу (фонға тереңдік беру үшін)
            drawGrid();

            // --- Нысананы салу (Жарқыраған алтын) ---
            ctx.save();
            setShadow(food.glow, 20);
            ctx.fillStyle = food.color;
            ctx.beginPath();
            // Айналып тұрған ромб тәрізді нысана
            ctx.translate(food.x, food.y);
            ctx.rotate(food.angle);
            ctx.fillRect(-food.size/2, -food.size/2, food.size, food.size);
            ctx.fill();
            ctx.restore();

            // --- Ойыншыны салу (Циан шеңбер) ---
            ctx.save();
            setShadow(player.glow, 25);
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            // Ортасындағы ақ нүкте
            setShadow('#fff', 5);
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // Фондық сетка функциясы
        function drawGrid() {
            ctx.save();
            setShadow('transparent', 0); // Сетка жарқырамауы керек
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)'; // Өте әлсіз циан түс
            ctx.lineWidth = 0.5;
            const gridSize = 50;

            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Ойын циклі
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Терезе өлшемі өзгергенде кенепті ортада сақтау (CSS жасайды, бұл жай ғана сенімділік үшін)
        window.addEventListener('resize', () => {
            // Керек болса кенеп өлшемін өзгертуге болады, бірақ қазірше статикалық
        });

        gameLoop();
    </script>
</body>
</html>
